waterfall_agent:
  target: dev
  outputs:
    dev:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'PRICING_READONLY') }}"
      database: PRICING_DB
      warehouse: "{{ env_var('SNOWFLAKE_WAREHOUSE', 'PRICING_WH') }}"
      schema: bronze
      threads: 4
      client_session_keep_alive: false

    prod:
      type: snowflake
      account: "{{ env_var('SNOWFLAKE_ACCOUNT') }}"
      user: "{{ env_var('SNOWFLAKE_USER') }}"
      password: "{{ env_var('SNOWFLAKE_PASSWORD') }}"
      role: "{{ env_var('SNOWFLAKE_ROLE', 'PRICING_READONLY') }}"
      database: PRICING_DB
      warehouse: PRICING_WH_PROD
      schema: bronze
      threads: 8
      client_session_keep_alive: false
